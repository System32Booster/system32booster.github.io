<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxicosm</title>
    <style>
        /* --- CSS: 基本設定と変数 --- */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --accent-color: #4a90e2;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* ダークモード用の配色 */
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #ff7675;
            --card-bg: #1e1e1e;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- ヘッダー・テーマ切り替え --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        #theme-toggle {
            background: none;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        #theme-toggle:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* --- プロフィールセクション --- */
        .profile-section {
            text-align: center;
            padding: 50px 0;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: var(--accent-color);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }

        .job-title {
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* --- コンテンツカード --- */
        .section-title {
            margin: 40px 0 20px;
            font-size: 1.5rem;
            position: relative;
            padding-left: 10px;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 4px;
            background-color: var(--accent-color);
        }

        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
        }

        .skills-list li {
            background-color: rgba(74, 144, 226, 0.1);
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* --- フッター --- */
        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Room</h1>
            <button id="theme-toggle">Mode</button>
        </header>

        <section class="profile-section">
            <div class="avatar">Me</div>
            <h2>Maxicosm</h2>
            <p class="job-title">いろいろやってる学生</p>
            <p>趣味でいろいろやったりしてます。よろしくお願いします。</p>
        </section>

        <section>
            <h3 class="section-title">TEST</h3>
            <div class="card">
                <ul class="skills-list">
                    <li>1</li>
                    <li>2</li>
                    <li>3</li>
                    <li>4</li>
                    <li>5</li>
                </ul>
            </div>
        </section>

        <section>
            <h3 class="section-title">Works & Biography</h3>
            <div class="card">
                <p><strong>2024 - 現在:</strong> フリーランスのWebデザイナーとして独立(ここプレースホルダー)</p>
                <p><strong>2021 - 2024:</strong> 都内の制作会社にてUIデザイナーとして勤務(ここプレースホルダー)</p>
                <p><strong>2021:</strong> 大学の芸術学部を卒業(ここプレースホルダー)</p>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 RDN Media. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        
        // 読み込み時にブラウザ（ローカルストレージ）の設定を確認
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }

        // ボタンがクリックされたときの処理
        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
